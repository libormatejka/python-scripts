name: Stáhnout Instagram obrázky a uložit ZIP

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Režim stahování'
        required: true
        default: 'csv'
        type: choice
        options:
          - csv
          - saved
      collection:
        description: 'Název kolekce (pouze pro režim saved, prázdné = všechny uložené)'
        required: false
        default: ''
  schedule:
    - cron: '0 4 * * *'  # Každý den v 4:00 ráno UTC (režim csv)

jobs:
  download-instagram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastavení Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalace systémových závislostí
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Instalace Python závislostí
        run: |
          python -m pip install --upgrade pip
          pip install selenium pandas requests webdriver-manager

      - name: Spuštění Instagram downloaderu
        env:
          IG_MODE: ${{ github.event.inputs.mode || 'csv' }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}  # přidat v Settings → Secrets
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}  # přidat v Settings → Secrets
          IG_COLLECTION: ${{ github.event.inputs.collection || '' }}
        run: python instagramDownloader.py

      - name: Upload ZIP archivu jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: instagram-export-${{ github.run_id }}
          path: '*_Instagram_Export.zip'
          if-no-files-found: warn
          retention-days: 7

      - name: Upload debug screenshotů
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: 'debug_*.png'
          if-no-files-found: ignore
          retention-days: 3
